<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/static/css/register.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
</head>

<body>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class='bx bx-moon'></i>
    </button>

    <div class="container active page-enter">
        <div class="form-box register">
            <form id="signup-form">
                <h1> Registration </h1>
                <div class="input-box">
                    <input type="text" id="signup-username" placeholder="username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" id="signup-email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>

                <div class="input-box password-container">
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <i class='bx bx-hide eye-icon' id="toggle-password" style="cursor: pointer; pointer-events: auto;"></i>
                </div>
                <button type="submit" class="btn"> Register </button>
                <p> or </p>
                <button type="button" class="btn-google" id="google-signup-btn">
                    <i class='bx bxl-google'></i> Sign up with Google
                </button>
            </form>
        </div>
        
        <div class="toggle-box">
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account? </p>
                <button type="button" class="btn" onclick="window.location.href='/login'"> Login </button>
            </div>
        </div>

    </div>

    <script src="/static/js/theme.js"></script>
    <script src="/static/js/register.js"></script>
</body>

</html>
