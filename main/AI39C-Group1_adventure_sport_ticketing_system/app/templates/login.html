<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/static/css/login.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
</head>

<body>

    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class='bx bx-moon'></i>
    </button>

    <div class="container page-enter">
        <div class="form-box login">
            <form id="login-form">
                <h1> Login </h1>
                <div class="input-box">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box password-container">
                    <input type="password" id="login-password" placeholder="Password" required>
                    <i class='bx bx-hide eye-icon' id="toggle-password" style="cursor: pointer; pointer-events: auto;"></i>
                </div>
                <div class="forgot-link">
                    <a href="/forgot">forgot password?</a>
                </div>
                <button type="submit" class="btn"> Login </button>
                <p> or </p>
                <button type="button" class="btn-google" id="google-login-btn">
                    <i class='bx bxl-google'></i> Sign in with Google
                </button>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome</h1>
                <p>Don't have an account? </p>
                <button type="button" class="btn" onclick="window.location.href='/register'"> Register </button>
            </div>
        </div>

    </div>

    <script src="/static/js/theme.js"></script>
    <script src="/static/js/login.js"></script>
</body>

</html>
