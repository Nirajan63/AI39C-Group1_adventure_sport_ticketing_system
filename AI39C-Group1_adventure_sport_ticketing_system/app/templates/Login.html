<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Thrill Sphere</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth_style.css') }}">
</head>

<body>
    <div class="container page-enter">
        <div class="form-box login">
            <form method="POST" action="{{ url_for('auth.login') }}">
                <h1> Login </h1>

                {% if error %}
                <p style="color: red; font-size: 14px;">⚠️ {{ error }}</p>
                {% endif %}

                <div class="input-box">
                    <input type="text" name="username" placeholder="Username" required autofocus>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" name="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="forgot-link">
                    <a href="#">forgot password?</a>
                </div>
                <button type="submit" class="btn"> Login </button>
                <p> or login with social platforms </p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome</h1>
                <p>Don't have an account? </p>
                <button type="button" class="btn" onclick="window.location.href='{{ url_for('auth.register') }}'"> Register </button>
            </div>
        </div>

    </div>
</body>
</html>
