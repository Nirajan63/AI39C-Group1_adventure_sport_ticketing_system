<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/static/css/forgot.css">
    <script>
        (function(){
            const savedTheme= localStorage.getItem('theme') || 'light'; 
            if (savedTheme==='dark'){
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
</head>

<body>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class='bx bx-moon'></i>
    </button>

    <div class="container active page-enter">
        <div class="form-box register">
            <form id="forgot-form">
                <h1> Reset Password </h1>
                <div class="input-box">
                    <input type="password" id="new-password" placeholder="New Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn"> Reset Password </button>
            </form>
        </div>
        
        <div class="toggle-box">
            <div class="toggle-panel toggle-right">
                <h1>Remembered?</h1>
                <p>Already know your password?</p>
                <button type="button" class="btn" onclick="window.location.href='/login'"> Login </button>
            </div>
        </div>

    </div>

     <script src="/static/js/theme.js"></script>
    <script src="/static/js/forgot.js"></script>
</body>

</html>
